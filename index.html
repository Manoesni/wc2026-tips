<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚽ VM 2026 — Tipstabell</title>
<style>
  :root {
    --green: #1a6b2a;
    --gold: #f5c518;
    --red: #c0392b;
    --bg: #f0f4f8;
    --card: #ffffff;
    --border: #d1d5db;
    --text: #1f2937;
    --muted: #6b7280;
    --header-bg: #1a3a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    padding-bottom: 60px;
  }

  @media print {
    body { background: white; padding: 0; font-size: 11px; }
    header, .toolbar, .save-btn, .toast, .modal-overlay, .share-bar, .no-print { display: none !important; }
    .section, .knockout-section, .scorer-section { margin: 6px 4px 0; }
    .section-title { font-size: 9px; padding-bottom: 3px; }
    .table-scroll { overflow: visible; box-shadow: none; border-radius: 0; }
    table { page-break-inside: avoid; }
    thead th { font-size: 10px; padding: 4px 6px; }
    td { border: 1px solid #bbb !important; }
    .cell-inner { min-height: 26px !important; padding: 3px 5px !important; gap: 3px !important; }
    .team-name { font-size: 10px !important; }
    .tflag { font-size: 13px !important; }
    .rm { display: none !important; }
    .group-label { font-size: 13px !important; }
    .cell-empty { display: none; }
    .print-title { display: block !important; }
  }
  .print-title {
    display: none;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
    padding: 8px 0 4px;
    color: #1a3a1a;
  }

  header {
    background: var(--header-bg);
    color: white;
    padding: 14px 16px 10px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 19px; font-weight: 700; }
  header p { font-size: 11px; opacity: 0.65; margin-top: 2px; }

  .toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: white;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toolbar button {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 13px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .toolbar button:hover { opacity: 0.85; }
  .toolbar button.secondary { background: #374151; }
  .toolbar button.pdf-btn { background: #7c3aed; }

  .share-bar {
    background: #fffbeb;
    border-bottom: 1px solid #fde68a;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .share-bar span { font-size: 12px; font-weight: 600; color: #92400e; white-space: nowrap; }
  .share-bar input {
    flex: 1; min-width: 0;
    border: 1px solid #fcd34d; border-radius: 6px;
    padding: 5px 8px; font-size: 11px; background: white; color: #374151;
  }
  .share-bar button {
    background: #d97706; color: white; border: none; border-radius: 6px;
    padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .share-bar button:hover { background: #b45309; }

  .section { margin: 12px 10px 0; }
  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); padding: 0 4px 6px;
  }

  .table-scroll {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  table { border-collapse: collapse; width: 100%; min-width: 300px; background: var(--card); }
  thead th {
    background: var(--header-bg); color: white;
    padding: 8px 10px; text-align: center; font-size: 13px; font-weight: 700;
    white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
  }
  thead th.group-col { background: #0f2010; min-width: 34px; width: 34px; }
  thead th.row-col   { background: #0f2010; min-width: 40px; width: 40px; font-size: 11px; }
  thead th.player-col { min-width: 110px; cursor: pointer; }
  thead th.player-col:hover { background: #2d5a3d; }

  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.group-start td { border-top: 2px solid var(--green); }

  td { padding: 0; border-right: 1px solid var(--border); vertical-align: top; }
  td:last-child { border-right: none; }

  td.group-label {
    background: #e8f5e9; text-align: center; font-weight: 800;
    font-size: 16px; color: var(--green); vertical-align: middle;
    min-width: 34px; width: 34px; padding: 4px;
  }
  td.row-label {
    background: #f9fafb; text-align: center; color: var(--muted);
    font-size: 11px; vertical-align: middle; padding: 4px;
    min-width: 40px; width: 40px;
  }

  .cell-inner {
    min-height: 44px; padding: 5px 7px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .cell-inner:hover { background: #f0fdf4; }
  .team-name { font-size: 12px; font-weight: 600; flex: 1; line-height: 1.2; }
  .tflag { font-size: 17px; flex-shrink: 0; }
  .rm {
    color: #d1d5db; font-size: 10px; cursor: pointer;
    padding: 2px 3px; display: none; flex-shrink: 0;
  }
  .cell-inner:hover .rm { display: inline; }
  .rm:hover { color: var(--red); }
  .cell-empty { color: #9ca3af; font-size: 12px; }

  .knockout-section { margin: 12px 10px 0; }
  .place-label {
    font-weight: 700; font-size: 12px; text-align: center;
    vertical-align: middle; padding: 4px; min-width: 40px; white-space: nowrap;
  }
  .place-label.gold   { background: #fef08a; color: #78350f; }
  .place-label.silver { background: #f1f5f9; color: #475569; }
  .place-label.bronze { background: #fff7ed; color: #92400e; }

  .scorer-section { margin: 12px 10px 0; }
  .scorer-label {
    background: #fce7f3; font-weight: 700; font-size: 12px; color: #9d174d;
    text-align: center; vertical-align: middle; padding: 4px;
    white-space: nowrap; min-width: 40px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px 16px 0 0;
    padding: 18px 16px 28px; width: 100%;
    max-width: 500px; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
  .modal p.sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .modal input[type=text] {
    width: 100%; padding: 11px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 10px;
  }
  .modal input[type=text]:focus { border-color: var(--green); }
  .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
  .modal-actions button {
    flex: 1; padding: 12px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-confirm { background: var(--green); color: white; }
  .btn-cancel  { background: #f3f4f6; color: var(--text); }
  .btn-danger  { background: var(--red); color: white; }

  .search-input {
    width: 100%; padding: 9px 11px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 10px;
  }
  .search-input:focus { border-color: var(--green); }

  .team-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; max-height: 46vh; overflow-y: auto; margin-bottom: 10px;
  }
  .team-btn {
    padding: 7px 4px; border: 2px solid var(--border); border-radius: 8px;
    background: white; font-size: 11px; font-weight: 600; cursor: pointer;
    text-align: center; display: flex; flex-direction: column;
    align-items: center; gap: 2px;
  }
  .team-btn .tflag { font-size: 20px; }
  .team-btn:hover  { border-color: var(--green); background: #f0fdf4; }
  .team-btn.selected { border-color: var(--green); background: #dcfce7; }

  .save-btn {
    position: fixed; bottom: 16px; right: 14px;
    background: var(--gold); color: #1a1a1a; border: none;
    border-radius: 50px; padding: 12px 20px; font-size: 14px;
    font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 150;
  }
  .save-btn:hover { background: #e0b010; }

  .toast {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: #1a3a1a; color: white; padding: 9px 18px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
    z-index: 300; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (min-width: 600px) {
    .modal { border-radius: 16px; margin: auto; }
    .modal-overlay { align-items: center; }
    .team-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="print-title">⚽ VM 2026 — Tipstabell</div>

<header class="no-print">
  <h1>⚽ VM 2026 — Tipstabell</h1>
  <p>Tryck på ett namn för att ändra det · Tryck på en cell för att tippa</p>
</header>

<div class="toolbar no-print">
  <button onclick="openAddPlayer()">➕ Deltagare</button>
  <button class="pdf-btn" onclick="exportPDF()">📄 Spara PDF</button>
  <button class="secondary" onclick="saveAndShare()">🔗 Spara &amp; Dela</button>
</div>

<div class="share-bar no-print" id="shareBar" style="display:none">
  <span>🔗 Din länk:</span>
  <input type="text" id="shareUrl" readonly onclick="this.select()" />
  <button onclick="copyLink()">Kopiera</button>
</div>

<div class="section">
  <div class="section-title">Gruppspel — välj 3 lag per grupp</div>
  <div class="table-scroll">
    <table>
      <thead><tr id="headerRow"><th class="group-col">Gr.</th><th class="row-col">Plats</th></tr></thead>
      <tbody id="groupBody"></tbody>
    </table>
  </div>
</div>

<div class="knockout-section">
  <div class="section-title">Slutspel — välj topp 3</div>
  <div class="table-scroll">
    <table class="knockout-table">
      <thead><tr id="knockoutHeaderRow"><th class="row-col">Plats</th></tr></thead>
      <tbody id="knockoutBody"></tbody>
    </table>
  </div>
</div>

<div class="scorer-section">
  <div class="section-title">⚽ Målkung</div>
  <div class="table-scroll">
    <table>
      <thead><tr id="scorerHeaderRow"><th class="row-col">⚽</th></tr></thead>
      <tbody><tr id="scorerRow"><td class="scorer-label">Målkung</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Add Player -->
<div class="modal-overlay" id="addPlayerModal">
  <div class="modal">
    <h2>Lägg till deltagare</h2>
    <p class="sub">Ange namn på ny deltagare</p>
    <input type="text" id="newPlayerName" placeholder="Namn..." maxlength="20" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addPlayerModal')">Avbryt</button>
      <button class="btn-confirm" onclick="confirmAddPlayer()">Lägg till</button>
    </div>
  </div>
</div>

<!-- Rename Player -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h2>Ändra deltagare</h2>
    <p class="sub" id="renameSub"></p>
    <input type="text" id="renameInput" placeholder="Nytt namn..." maxlength="20" />
    <div class="modal-actions">
      <button class="btn-danger" onclick="confirmRemovePlayer()">Ta bort</button>
      <button class="btn-cancel" onclick="closeModal('renameModal')">Avbryt</button>
      <button class="btn-confirm" onclick="confirmRename()">Spara</button>
    </div>
  </div>
</div>

<!-- Pick Team -->
<div class="modal-overlay" id="pickModal">
  <div class="modal">
    <h2 id="pickTitle">Välj lag</h2>
    <p class="sub" id="pickSub"></p>
    <input type="text" class="search-input" id="teamSearch" placeholder="Sök..." oninput="filterGrid()" />
    <div class="team-grid" id="teamGrid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('pickModal')">Avbryt</button>
      <button class="btn-confirm" onclick="confirmPick()">Välj</button>
    </div>
  </div>
</div>

<button class="save-btn no-print" onclick="saveAndShare()">💾 Spara &amp; Dela</button>
<div class="toast" id="toast"></div>

<script>
// ── GROUPS DATA (official WC 2026) ──────────────────────────────────────────
const WC_GROUPS = {
  A: ["Mexiko","Sydafrika","Sydkorea","Tjeckien"],
  B: ["Kanada","Schweiz","Qatar","Bosnien/Hercegovina"],
  C: ["Brasilien","Haiti","Marocko","Skottland"],
  D: ["USA","Australien","Paraguay","Turkiet"],
  E: ["Tyskland","Elfenbenskusten","Curaçao","Ecuador"],
  F: ["Nederländerna","Sverige","Japan","Tunisien"],
  G: ["Belgien","Nya Zeeland","Iran","Egypten"],
  H: ["Spanien","Uruguay","Saudiarabien","Kap Verde"],
  I: ["Frankrike","Norge","Senegal","Irak"],
  J: ["Argentina","Österrike","Algeriet","Jordanien"],
  K: ["Portugal","Colombia","Uzbekistan","DR Kongo"],
  L: ["England","Kroatien","Ghana","Panama"]
};

const FLAGS = {
  "Mexiko":"🇲🇽","Sydafrika":"🇿🇦","Sydkorea":"🇰🇷","Tjeckien":"🇨🇿",
  "Kanada":"🇨🇦","Schweiz":"🇨🇭","Qatar":"🇶🇦","Bosnien/Hercegovina":"🇧🇦",
  "Brasilien":"🇧🇷","Haiti":"🇭🇹","Marocko":"🇲🇦","Skottland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "USA":"🇺🇸","Australien":"🇦🇺","Paraguay":"🇵🇾","Turkiet":"🇹🇷",
  "Tyskland":"🇩🇪","Elfenbenskusten":"🇨🇮","Curaçao":"🇨🇼","Ecuador":"🇪🇨",
  "Nederländerna":"🇳🇱","Sverige":"🇸🇪","Japan":"🇯🇵","Tunisien":"🇹🇳",
  "Belgien":"🇧🇪","Nya Zeeland":"🇳🇿","Iran":"🇮🇷","Egypten":"🇪🇬",
  "Spanien":"🇪🇸","Uruguay":"🇺🇾","Saudiarabien":"🇸🇦","Kap Verde":"🇨🇻",
  "Frankrike":"🇫🇷","Norge":"🇳🇴","Senegal":"🇸🇳","Irak":"🇮🇶",
  "Argentina":"🇦🇷","Österrike":"🇦🇹","Algeriet":"🇩🇿","Jordanien":"🇯🇴",
  "Portugal":"🇵🇹","Colombia":"🇨🇴","Uzbekistan":"🇺🇿","DR Kongo":"🇨🇩",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Kroatien":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"
};

const ALL_TEAMS = Object.keys(FLAGS);

const SCORERS = [
  "Mbappé","Yamal","Haaland","Bellingham","Vinicius Jr","Rodri",
  "Kane","Lewandowski","Salah","Müller","Griezmann","Pedri",
  "Modrić","De Bruyne","Messi","Ronaldo","Osimhen","Lukaku","Neymar Jr"
];

const f = name => FLAGS[name] || "🏳️";

// ── STATE ────────────────────────────────────────────────────────────────────
let S = { players:[], groups:{}, knockout:{1:{},2:{},3:{}}, scorer:{} };

function defaultState() {
  S.players = ["Magnus","Tobbe","No-il"];
  S.groups = {};
  Object.keys(WC_GROUPS).forEach(g => S.groups[g] = {});
  S.knockout = {1:{},2:{},3:{}};
  S.scorer = {};
  const g = (grp,pi,t) => { S.groups[grp][pi] = t; };
  g('A',0,["Mexiko","Sydkorea","Tjeckien"]); g('A',1,["Mexiko","Tjeckien","Sydkorea"]); g('A',2,["Mexiko","Tjeckien","Sydkorea"]);
  g('B',0,["Sverige","Bosnien/Hercegovina","Kanada"]); g('B',1,["Sverige","Kanada","Bosnien/Hercegovina"]); g('B',2,["Sverige","Kanada","Bosnien/Hercegovina"]);
  g('C',0,["Brasilien","Marocko","Skottland"]); g('C',1,["Brasilien","Marocko","Skottland"]); g('C',2,["Marocko","Brasilien","Skottland"]);
  g('D',0,["Paraguay","USA","Turkiet"]); g('D',1,["Turkiet","USA","Paraguay"]); g('D',2,["USA","Turkiet","Australien"]);
  g('E',0,["Tyskland","Elfenbenskusten","Ecuador"]); g('E',1,["Tyskland","Ecuador","Elfenbenskusten"]); g('E',2,["Tyskland","Ecuador","Elfenbenskusten"]);
  g('F',0,["Nederländerna","Japan","Sverige"]); g('F',1,["Nederländerna","Japan","Sverige"]); g('F',2,["Sverige","Nederländerna","Japan"]);
  g('G',0,["Belgien","Egypten","Iran"]); g('G',1,["Belgien","Egypten","Iran"]); g('G',2,["Belgien","Iran","Nya Zeeland"]);
  g('H',0,["Spanien","Uruguay","Saudiarabien"]); g('H',1,["Spanien","Uruguay","Saudiarabien"]); g('H',2,["Spanien","Uruguay","Kap Verde"]);
  g('I',0,["Norge","Frankrike","Senegal"]); g('I',1,["Frankrike","Senegal","Norge"]); g('I',2,["Frankrike","Norge","Senegal"]);
  g('J',0,["Argentina","Österrike","Algeriet"]); g('J',1,["Argentina","Österrike","Algeriet"]); g('J',2,["Argentina","Österrike","Algeriet"]);
  g('K',0,["Portugal","Colombia","Uzbekistan"]); g('K',1,["Portugal","Colombia","Uzbekistan"]); g('K',2,["Portugal","Colombia","DR Kongo"]);
  g('L',0,["England","Kroatien","Ghana"]); g('L',1,["England","Kroatien","Ghana"]); g('L',2,["England","Kroatien","Ghana"]);
  S.knockout = {
    1:{0:"Spanien",1:"Frankrike",2:"England"},
    2:{0:"Frankrike",1:"Argentina",2:"Frankrike"},
    3:{0:"Argentina",1:"Frankrike",2:"England"}
  };
  S.scorer = {0:"Mbappé",1:"Yamal",2:"Mbappé"};
}

// ── URL SHARE ────────────────────────────────────────────────────────────────
function encode() { return btoa(unescape(encodeURIComponent(JSON.stringify(S)))); }
function decode(s) { try { return JSON.parse(decodeURIComponent(escape(atob(s)))); } catch(e) { return null; } }

function saveAndShare() {
  const url = location.origin + location.pathname + '?d=' + encode();
  history.replaceState(null,'',url);
  document.getElementById('shareBar').style.display = 'flex';
  document.getElementById('shareUrl').value = url;
  copyLink();
}
function copyLink() {
  const inp = document.getElementById('shareUrl');
  inp.select();
  try { navigator.clipboard.writeText(inp.value); } catch(e) { document.execCommand('copy'); }
  showToast('📋 Länk kopierad — dela den med dina vänner!');
}

function loadURL() {
  const d = new URLSearchParams(location.search).get('d');
  if (d) { const st = decode(d); if (st && st.players) { S = st; return true; } }
  return false;
}

// ── PDF ───────────────────────────────────────────────────────────────────────
function exportPDF() { showToast('🖨️ Öppnar utskrift / Spara som PDF...'); setTimeout(()=>window.print(),350); }

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() { renderHeaders(); renderGroups(); renderKnockout(); renderScorer(); }

function renderHeaders() {
  ['headerRow','knockoutHeaderRow','scorerHeaderRow'].forEach(id => {
    const row = document.getElementById(id);
    const keep = id === 'headerRow' ? 2 : 1;
    while (row.children.length > keep) row.removeChild(row.lastChild);
    S.players.forEach((p,i) => {
      const th = document.createElement('th');
      th.className = 'player-col';
      th.textContent = p;
      th.title = 'Klicka för att byta namn';
      th.onclick = () => openRename(i);
      row.appendChild(th);
    });
  });
}

const SLOTS_PER_GROUP = 3;
const SLOT_LABELS = ['1:a','2:a','3:a','4:a'];

function renderGroups() {
  const tbody = document.getElementById('groupBody');
  tbody.innerHTML = '';
  Object.keys(WC_GROUPS).forEach(grp => {
    for (let slot = 0; slot < SLOTS_PER_GROUP; slot++) {
      const tr = document.createElement('tr');
      if (slot === 0) tr.classList.add('group-start');
      if (slot === 0) {
        const tdG = document.createElement('td');
        tdG.className = 'group-label'; tdG.rowSpan = SLOTS_PER_GROUP; tdG.textContent = grp;
        tr.appendChild(tdG);
      }
      const tdR = document.createElement('td');
      tdR.className = 'row-label'; tdR.textContent = SLOT_LABELS[slot];
      tr.appendChild(tdR);
      S.players.forEach((_,pi) => {
        const team = ((S.groups[grp]||{})[pi]||[])[slot]||null;
        tr.appendChild(makeCell(team, f(team), () => openPick('group',grp,pi,slot), ()=>{ if(S.groups[grp][pi]) S.groups[grp][pi][slot]=null; render(); }));
      });
      tbody.appendChild(tr);
    }
  });
}

function renderKnockout() {
  const tbody = document.getElementById('knockoutBody');
  tbody.innerHTML = '';
  [{k:1,l:'🥇 Vinnare',c:'gold'},{k:2,l:'🥈 2:a plats',c:'silver'},{k:3,l:'🥉 3:e plats',c:'bronze'}].forEach(({k,l,c})=>{
    const tr = document.createElement('tr');
    const tdL = document.createElement('td');
    tdL.className = `place-label ${c}`; tdL.innerHTML = l; tr.appendChild(tdL);
    S.players.forEach((_,pi)=>{
      const team = (S.knockout[k]||{})[pi]||null;
      tr.appendChild(makeCell(team, f(team), ()=>openPick('ko',k,pi,null), ()=>{ S.knockout[k][pi]=null; render(); }));
    });
    tbody.appendChild(tr);
  });
}

function renderScorer() {
  const tr = document.getElementById('scorerRow');
  while (tr.children.length > 1) tr.removeChild(tr.lastChild);
  S.players.forEach((_,pi)=>{
    const pick = S.scorer[pi]||null;
    tr.appendChild(makeCell(pick, '⚽', ()=>openPick('scorer',null,pi,null), ()=>{ S.scorer[pi]=null; render(); }, true));
  });
}

function makeCell(name, icon, onOpen, onRemove, nameOnly) {
  const td = document.createElement('td');
  const div = document.createElement('div');
  div.className = 'cell-inner';
  if (name) {
    div.innerHTML = `<span class="tflag">${icon}</span><span class="team-name">${name}</span><span class="rm">✕</span>`;
    div.querySelector('.rm').onclick = e => { e.stopPropagation(); onRemove(); };
  } else {
    div.innerHTML = `<span class="cell-empty">+ Välj</span>`;
  }
  div.onclick = () => onOpen();
  td.appendChild(div);
  return td;
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

// Add player
function openAddPlayer() {
  document.getElementById('newPlayerName').value='';
  openModal('addPlayerModal');
  setTimeout(()=>document.getElementById('newPlayerName').focus(),80);
}
function confirmAddPlayer() {
  const n = document.getElementById('newPlayerName').value.trim();
  if (!n) return;
  S.players.push(n);
  closeModal('addPlayerModal');
  render();
}
document.getElementById('newPlayerName').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmAddPlayer(); });

// Rename
let _ri = -1;
function openRename(i) {
  _ri = i;
  document.getElementById('renameSub').textContent = 'Nuvarande namn: ' + S.players[i];
  document.getElementById('renameInput').value = S.players[i];
  openModal('renameModal');
  setTimeout(()=>document.getElementById('renameInput').focus(),80);
}
function confirmRename() {
  const n = document.getElementById('renameInput').value.trim();
  if (!n) return;
  S.players[_ri] = n;
  closeModal('renameModal');
  render();
}
function confirmRemovePlayer() {
  if (!confirm(`Ta bort ${S.players[_ri]}?`)) return;
  const idx = _ri;
  S.players.splice(idx,1);
  Object.keys(S.groups).forEach(g=>{
    const ng={};
    Object.keys(S.groups[g]).forEach(pi=>{ const n=+pi; if(n<idx) ng[n]=S.groups[g][n]; else if(n>idx) ng[n-1]=S.groups[g][n]; });
    S.groups[g]=ng;
  });
  [1,2,3].forEach(k=>{ const nk={}; Object.keys(S.knockout[k]).forEach(pi=>{ const n=+pi; if(n<idx) nk[n]=S.knockout[k][n]; else if(n>idx) nk[n-1]=S.knockout[k][n]; }); S.knockout[k]=nk; });
  const ns={}; Object.keys(S.scorer).forEach(pi=>{ const n=+pi; if(n<idx) ns[n]=S.scorer[n]; else if(n>idx) ns[n-1]=S.scorer[n]; }); S.scorer=ns;
  closeModal('renameModal'); render();
}
document.getElementById('renameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmRename(); });

// Pick
let _ctx = null;
function openPick(type, ref, pi, slot) {
  _ctx = {type,ref,pi,slot};
  let teams, cur, title, sub;
  if (type==='group') {
    teams = WC_GROUPS[ref];
    cur = ((S.groups[ref]||{})[pi]||[])[slot];
    title = `Grupp ${ref} — ${S.players[pi]}`;
    sub = `Välj lag på plats ${slot+1}`;
  } else if (type==='ko') {
    teams = ALL_TEAMS;
    cur = (S.knockout[ref]||{})[pi];
    title = `${{1:'🥇 Vinnare',2:'🥈 2:a plats',3:'🥉 3:e plats'}[ref]} — ${S.players[pi]}`;
    sub = 'Välj ett lag';
  } else {
    teams = [...SCORERS, ...ALL_TEAMS.filter(t=>!SCORERS.includes(t))];
    cur = S.scorer[pi];
    title = `Målkung — ${S.players[pi]}`;
    sub = 'Välj toppskyttt';
  }
  document.getElementById('pickTitle').textContent = title;
  document.getElementById('pickSub').textContent = sub;
  document.getElementById('teamSearch').value = '';
  buildGrid(teams, cur, type==='scorer');
  openModal('pickModal');
}

function confirmPick() {
  const sel = document.querySelector('#teamGrid .team-btn.selected');
  if (!sel) { closeModal('pickModal'); return; }
  const v = sel.dataset.name;
  const {type,ref,pi,slot} = _ctx;
  if (type==='group') {
    if (!S.groups[ref][pi]) S.groups[ref][pi]=[];
    S.groups[ref][pi][slot]=v;
  } else if (type==='ko') {
    if (!S.knockout[ref]) S.knockout[ref]={};
    S.knockout[ref][pi]=v;
  } else {
    S.scorer[pi]=v;
  }
  closeModal('pickModal'); render();
}

function buildGrid(teams, cur, nameOnly) {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  teams.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'team-btn' + (name===cur?' selected':'');
    btn.dataset.name = name;
    btn.innerHTML = nameOnly
      ? `<span style="font-size:12px;font-weight:700">${name}</span>`
      : `<span class="tflag">${f(name)}</span><span>${name}</span>`;
    btn.onclick = () => { grid.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); };
    grid.appendChild(btn);
  });
}

function filterGrid() {
  const q = document.getElementById('teamSearch').value.toLowerCase();
  document.querySelectorAll('#teamGrid .team-btn').forEach(b=>{
    b.style.display = b.dataset.name.toLowerCase().includes(q)?'':'none';
  });
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'),3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
if (!loadURL()) defaultState();
render();
</script>
</body>
</html>
